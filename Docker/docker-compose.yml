services:

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: skin-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: skin-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend